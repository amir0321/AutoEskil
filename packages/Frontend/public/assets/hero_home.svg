<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071025"/>
      <stop offset="50%" stop-color="#0b2a3a"/>
      <stop offset="100%" stop-color="#0e3a4a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="b" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.9" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="b" mode="screen" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g1)" />

  <g filter="url(#f1)">
    <ellipse cx="30%" cy="20%" rx="520" ry="320" fill="url(#g2)" />
    <ellipse cx="80%" cy="70%" rx="620" ry="420" fill="#0ea5e971" />
  </g>

  <g opacity="0.12">
    <rect x="0" y="0" width="100%" height="100%" fill="url(#g2)"/>
  </g>

</svg>
